name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment (preview/production)'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '10'

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build database
        run: pnpm build:db

      - name: Build API (Shell)
        run: pnpm build:shell

      - name: Build Next.js Blog
        run: pnpm build --filter=next-blog

      - name: Build Nuxt Blog
        run: pnpm build --filter=nuxt-blog

      - name: Build SvelteKit Blog
        run: pnpm build --filter=svelte-blog

      - name: Build Astro Blog
        run: pnpm build --filter=astro-blog

      - name: Build SolidStart Blog
        run: pnpm build --filter=solid-blog

      - name: Deploy to Cloudflare Pages (Production)
        if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'production'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/ --project-name=cf-blog --branch=main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages (Preview)
        if: github.event.inputs.environment == 'preview' && github.ref != 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/ --project-name=cf-blog --branch=preview-${{ github.sha }} --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Output deployment URL
        run: |
          echo "✅ Deployment complete!"
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "🌐 Production URL: https://cf-blog.pages.dev"
          else
            echo "🌐 Preview URL: https://preview-${{ github.sha }}.cf-blog.pages.dev"
          fi
