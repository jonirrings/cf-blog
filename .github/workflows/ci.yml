name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '10'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run typecheck
        run: pnpm typecheck

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test:unit

  build:
    name: Build All Frameworks
    runs-on: ubuntu-latest
    needs: [lint, typecheck, unit-test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build database
        run: pnpm build:db

      - name: Build API (Shell)
        run: pnpm build:shell

      - name: Build Next.js Blog
        run: pnpm build --filter=next-blog

      - name: Build Nuxt Blog
        run: pnpm build --filter=nuxt-blog

      - name: Build SvelteKit Blog
        run: pnpm build --filter=svelte-blog

      - name: Build Astro Blog
        run: pnpm build --filter=astro-blog

      - name: Build SolidStart Blog
        run: pnpm build --filter=solid-blog

      - name: Upload Next.js artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-blog-dist
          path: apps/next-blog/dist
          retention-days: 7

      - name: Upload Nuxt artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuxt-blog-dist
          path: apps/nuxt-blog/dist
          retention-days: 7

      - name: Upload SvelteKit artifact
        uses: actions/upload-artifact@v4
        with:
          name: svelte-blog-dist
          path: apps/svelte-blog/build
          retention-days: 7

      - name: Upload Astro artifact
        uses: actions/upload-artifact@v4
        with:
          name: astro-blog-dist
          path: apps/astro-blog/dist
          retention-days: 7

      - name: Upload SolidStart artifact
        uses: actions/upload-artifact@v4
        with:
          name: solid-blog-dist
          path: apps/solid-blog/dist
          retention-days: 7
