packages:
  - 'apps/*'
  - 'packages/*'
allowBuilds:
  '@parcel/watcher': true
  es5-ext: true
  esbuild: true
  sharp: true
  workerd: true

catalog:
  # React ecosystem

  # Linting & Formatting
  '@biomejs/biome': ^2.4.14

  # Cloudflare
  '@cloudflare/workers-types': ^4.20250505.0
  '@lucide/astro': ^1.14.0
  '@lucide/svelte': ^1.14.0
  '@lucide/vue': ^1.14.0
  '@playwright/test': ^1.59.1
  '@tailwindcss/postcss': ^4.2.4

  # Tiptap editor
  '@tiptap/core': ^3.22.5
  '@tiptap/extension-image': ^3.22.5
  '@tiptap/extension-link': ^3.22.5
  '@tiptap/extension-placeholder': ^3.22.5
  '@tiptap/pm': ^3.22.5
  '@tiptap/react': ^3.22.5
  '@tiptap/starter-kit': ^3.22.5
  '@tiptap/vue-3': ^3.22.5

  # Node.js types
  '@types/node': ^24.0.0

  # React types
  '@types/react': ^19.2.0
  '@types/react-dom': ^19.2.0
  '@vitest/coverage-v8': ^4.1.5

  # i18next
  i18next: ^26.0.8
  i18next-browser-languagedetector: ^8.2.1
  i18next-http-backend: ^3.0.6

  # Lucide icons
  lucide-react: ^1.14.0
  lucide-solid: ^1.14.0

  # Next.js
  next: ^16.2.4
  postcss: ^8.5.13
  react: ^19.1.0
  react-dom: ^19.1.0
  react-i18next: ^17.0.6

  # Tailwind CSS v4
  tailwindcss: ^4.2.4
  '@tailwindcss/vite': ^4.2.4

  # Build tools
  tsx: ^4.7.0

  # TypeScript
  typescript: ^6.0.3

  # Testing
  vitest: ^4.1.5

  # Cloudflare
  wrangler: ^4.87.0

onlyBuiltDependencies:
  - '@tailwindcss/oxide'
  - esbuild
