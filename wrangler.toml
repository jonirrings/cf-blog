#:schema node_modules/wrangler/config-schema.json
name = "cf-blog"
main = "apps/shell/src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# D1 数据库
[[d1_databases]]
binding = "DB"
database_name = "cf-blog-db"
database_id = "YOUR_D1_DATABASE_ID"
migrations_dir = "packages/db/drizzle"

# KV 命名空间
[[kv_namespaces]]
binding = "CONFIG_KV"
id = "YOUR_CONFIG_KV_ID"

[[kv_namespaces]]
binding = "CACHE_KV"
id = "YOUR_CACHE_KV_ID"

[[kv_namespaces]]
binding = "USER_KV"
id = "YOUR_USER_KV_ID"

# R2 存储桶
[[r2_buckets]]
binding = "IMAGES_R2"
bucket_name = "cf-blog-images"

# Durable Objects
[[durable_objects.bindings]]
name = "PRESENCE_DO"
class_name = "PresenceDO"

[[durable_objects.bindings]]
name = "ROOM_DO"
class_name = "RoomDO"

[[durable_objects.bindings]]
name = "HOME_DO"
class_name = "HomeDO"

[[migrations]]
tag = "v1"
new_classes = ["PresenceDO", "RoomDO", "HomeDO"]

# 生产环境变量（敏感信息使用 wrangler secret put）
[vars]
ENVIRONMENT = "production"
SITE_URL = "https://blog.jonirrings.com"

# 开发服务器（仅用于 shell 本地调试，日常开发用 wrangler.dev.toml）
[dev]
port = 8788
